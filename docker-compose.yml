services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: translate-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:5050:5000"
    environment:
      LT_HOST: 0.0.0.0
      LT_PORT: 5000
      # Disable web UI (we only need the REST API)
      LT_DISABLE_WEB_UI: "true"
      # Only English → Vietnamese. Other locales hit Google directly in the
      # upstream client, so we don't pay the RAM cost of their Argos models.
      LT_LOAD_ONLY: "en,vi"
      # Threads per worker. Argos inference is CPU-bound.
      LT_THREADS: "2"
      # Workers = concurrent translation requests. 3 workers × 2 threads = 6 (fine on 4 vCPU under burst).
      LT_WORKERS: "3"
      # Optional API key — set via .env so the upstream client can auth.
      LT_API_KEYS: ${LT_API_KEYS_ENABLED:-false}
      LT_REQ_LIMIT: "120"
      LT_CHAR_LIMIT: "5000"
      LT_BATCH_LIMIT: "32"
      # Suggestions API is off (we don't crowdsource corrections).
      LT_DISABLE_FILES_TRANSLATION: "true"
    volumes:
      # Persist downloaded Argos model files between container restarts.
      - libretranslate-data:/home/libretranslate/.local
    mem_limit: 2000m
    cpus: 3.5
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/languages"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

volumes:
  libretranslate-data:
