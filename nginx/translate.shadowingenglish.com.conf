# nginx reverse proxy for translate-service (HTTP, no TLS).
#
# Install:
#   sudo cp nginx/translate.shadowingenglish.com.conf /etc/nginx/sites-available/translate-service
#   sudo ln -s /etc/nginx/sites-available/translate-service /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Add TLS later with certbot if you change your mind:
#   sudo certbot --nginx -d translate.shadowingenglish.com

# Rate limit: 30 req/s per client IP, burst 60. Tune if upstream is hammered.
limit_req_zone $binary_remote_addr zone=translate_rl:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name translate.shadowingenglish.com d.shadowingenglish.com;

    # Reject huge bodies; Argos has its own 5000-char limit anyway.
    client_max_body_size 256k;

    # Don't log healthchecks.
    location = /languages {
        access_log off;
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=translate_rl burst=60 nodelay;

        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # First-request cold-load can take up to ~15s while Argos loads the model.
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        proxy_buffering off;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"   always;
    add_header Referrer-Policy        "no-referrer" always;
}
